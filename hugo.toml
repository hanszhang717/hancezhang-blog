baseURL = "https://www.hancezhang.blog/"
canonifyURLs = true
buildFuture = true
theme = 'PaperMod'
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = true

[languages]
  [languages.en]
    languageCode = "en-us"
    languageName = "English"
    weight = 1
    title = "Hance Zhang's Blog"
    contentDir = "content/en"
    [languages.en.params]
      homeInfoParams = {Title = "👋 Welcome to Hance Zhang's Blog", Content = "Hance Zhang writes about AI, product building, business models, investing, and human relationships. Across these topics, he is ultimately interested in one thing: structure.\n\nHis work explores how incentives shape behavior, how time amplifies what is already there, and how systems quietly train people, organizations, and markets over the long run. Rather than focusing on slogans or stated values, he is interested in the deeper mechanisms that produce durable outcomes."}
    [[languages.en.menu.main]]
      name = "Posts"
      url = "/posts/"
      weight = 1
    [[languages.en.menu.main]]
      name = "Archive"
      url = "/archives/"
      weight = 2
    [[languages.en.menu.main]]
      name = "Search"
      url = "/search/"
      weight = 3

  [languages.zh]
    languageCode = "zh-cn"
    languageName = "中文"
    weight = 2
    title = "Hance Zhang的博客"
    contentDir = "content/zh"
    [languages.zh.params]
      homeInfoParams = {Title = "👋 欢迎来到 Hance Zhang的博客", Content = "Hance Zhang 关注 AI、产品、商业模式、投资，以及人与人之间关系的长期演化。贯穿这些主题的，是他对「结构」的持续兴趣。\n\n他的写作关注激励如何塑造行为，时间如何放大既有模式，以及系统如何在长期中悄悄训练个人、组织与市场。比起口号和表态，他更关心那些真正决定结果的深层机制。"}
    [[languages.zh.menu.main]]
      name = "文章"
      url = "/posts/"
      weight = 1
    [[languages.zh.menu.main]]
      name = "归档"
      url = "/archives/"
      weight = 2
    [[languages.zh.menu.main]]
      name = "搜索"
      url = "/search/"
      weight = 3

[params]
  defaultTheme = "auto"
  ShowReadingTime = true
  showtoc = false
  showtranslations = true # For PaperMod language switcher
  displayFullLangName = true

  [params.assets]
    favicon = "favicon.svg"

  [[params.socialIcons]]
    name = "x"
    url = "https://x.com/hance_zhang7"
  [[params.socialIcons]]
    name = "email"
    url = "mailto:hanszhang717@gmail.com"

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    includeMatches = true
    findAllMatches = false
    minMatchCharLength = 2
    threshold = 0.2
    location = 0
    distance = 100
    keys = ["title"]

[outputs]
  home = ["HTML", "RSS", "JSON"]
